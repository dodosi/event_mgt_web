version: '3.8'

volumes:
  datafiles:

services:
  db:
    #image: mysql:8.0.0
    container_name: db
    image: mariadb:10.7
    # cap_add:
    #   - SYS_NICE
    #command: mysqld --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tiba
      #MYSQL_USER: root
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - '3307:3306'
    volumes:
      - './data:/var/lib/mysql'
      #- "./.mysql-data/db:/var/lib/mysql"
      # - './docker/db/my.cnf:/etc/mysql/conf.d/my.cnf'
      # - './docker/db/sql:/docker-entrypoint-initdb.d'
    networks:
      - app-network

  website:
    container_name: php73
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MYSQL_DB_HOST=db
      - MYSQL_DB_PORT=3307
      - MYSQL_DB_USERNAME=root
      - MYSQL_DB_PASSWORD=root
      - MYSQL_DB_DATABASE=tiba
    ports:
      - 8080:80
      - 8083:443
    volumes:
      - /c/xampp3/htdocs/tiba  
    depends_on:
      - db
    networks:
      - app-network
    links:
      - db
  phpmyadmin:
      depends_on:
       - db
      image: phpmyadmin/phpmyadmin
      container_name: phpmyadmin
      restart: always
      ports:
       - '8081:80'
      environment:
        PMA_HOST: db
      networks:
       - app-network  
  apache:
      image: httpd:2.4.50-alpine3.14
      volumes:
       - ./php/www:/var/www/html
      ports:
       - 8084:80
       - 8085:443
      links:
       - website 
      networks:
       - app-network

#Docker Networks
networks:
  app-network:
    driver: bridge   